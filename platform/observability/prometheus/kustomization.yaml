apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monitoring

resources:
  - namespace.yaml

helmCharts:
  - name: kube-prometheus-stack
    repo: https://prometheus-community.github.io/helm-charts
    version: 87.3.0
    releaseName: prometheus
    namespace: monitoring
    includeCRDs: false
    valuesFile: values.yaml