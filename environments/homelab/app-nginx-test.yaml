apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-test
  namespace: argocd
spec:
  project: applications

  source:
    repoURL: https://github.com/olvandil/homelab-kubernetes.git
    targetRevision: main
    path: applications/nginx-test

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true